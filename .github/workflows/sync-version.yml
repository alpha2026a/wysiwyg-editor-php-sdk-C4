name: Sync Version – PHP SDK
 
on:
  repository_dispatch:
    types: [version_update]
 
permissions:
  contents: write
  pull-requests: write
 
jobs:
  sync:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}
          fetch-depth: 0
 

      - name: Load & validate version
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          VERSION="${VERSION//,/\.}"
 
          if [ -z "$VERSION" ]; then
            echo "Version missing in dispatch payload"
            exit 1
          fi
 
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version format: $VERSION"
            exit 1
          fi
 
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Dispatching version $VERSION"
 

      - name: Prepare release branch
        run: |
          BRANCH="release-v${VERSION}"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
 
          git fetch origin
 
          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            git checkout "$BRANCH"
            git pull origin "$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi
 

      - name: Update composer.json
        run: |
          jq ".version = \"$VERSION\"" composer.json > tmp.json
          mv tmp.json composer.json
 

      - name: Commit & push
        run: |
          git config user.name "froala-travis-bot"
          git config user.email "froala_git_travis_bot@idera.com"

          git add composer.json
          git commit -m "chore: release PHP SDK v${VERSION}" || echo "Nothing to commit"
      
          git push origin "$BRANCH"
 

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.PAT }}
          RELEASE_NOTES: ${{ github.event.client_payload.release_notes }}
        run: |
          git fetch origin master
 
          if git diff --quiet origin/master..."$BRANCH"; then
            echo "No commits between $BRANCH and master. Skipping PR creation."
            exit 0
          fi
 
          PR_BODY=$(printf "## Release Notes (from primary repo)\n\n%s\n" "$RELEASE_NOTES")
 
          gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "Release v${VERSION}" \
            --body "$PR_BODY" \
            || echo "Pull request already exists"
